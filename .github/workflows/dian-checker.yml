name: DIAN citas checker

on:
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la pestaña Actions
  schedule:
    # Cada 5 minutos de 08:00 a 18:55 Colombia (13:00 a 23:55 UTC)
    - cron: "*/5 13-23 * * *"
    
    # Última revisión a las 19:00 Colombia (00:00 UTC del día siguiente)
    # Nota: Si en Colombia son las 19:00, en UTC ya es la medianoche (00:00)
    - cron: "0 0 * * *"

jobs:
  check-dian:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate email secrets
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          test -n "$EMAIL_FROM" || (echo "EMAIL_FROM está vacío"; exit 1)
          test -n "$EMAIL_PASSWORD" || (echo "EMAIL_PASSWORD está vacío"; exit 1)
          test -n "$EMAIL_TO" || (echo "EMAIL_TO está vacío"; exit 1)
          echo "Secrets de email cargados correctamente"

      - name: Check DIAN appointments
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python dian_checker.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dian-screenshots
          path: dian_*.png
          if-no-files-found: ignore
