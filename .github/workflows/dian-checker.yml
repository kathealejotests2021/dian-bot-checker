name: DIAN citas checker

on:
  workflow_dispatch:
  
  push:
    branches:
      - main
      
  schedule:
    - cron: "*/5 * * * *"

jobs:
  check-dian:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate email secrets
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          test -n "$EMAIL_FROM" || (echo "EMAIL_FROM está vacío"; exit 1)
          test -n "$EMAIL_PASSWORD" || (echo "EMAIL_PASSWORD está vacío"; exit 1)
          test -n "$EMAIL_TO" || (echo "EMAIL_TO está vacío"; exit 1)
          echo "Secrets de email cargados correctamente"

      - name: Check DIAN appointments
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python dian_checker.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dian-screenshots
          path: dian_*.png
          if-no-files-found: ignore
